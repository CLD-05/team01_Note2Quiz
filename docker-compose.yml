services:
  # ---- MySQL ----
  db:
    image: mysql:8.0
    container_name: note2quiz-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Spring Boot ----
  backend:
    build:
      context: ./apps/backend
    container_name: note2quiz-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_AI_GOOGLE_GENAI_API_KEY: ${GEMINI_API_KEY}
      SPRING_AI_GOOGLE_GENAI_CHAT_OPTIONS_MODEL: gemini-2.5-flash
      SPRING_AI_GOOGLE_GENAI_CHAT_OPTIONS_TEMPERATURE: 0.7
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ---- React (Nginx) ----
  frontend:
    build:
      context: ./apps/frontend
    container_name: note2quiz-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mysql-data:
